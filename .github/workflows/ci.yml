name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Skip CI on Release Please version-bump commits — no Rust code changes.
# Quality gate is enforced via PR checks before the release PR is merged.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Skip all CI jobs on Release Please version-bump commits.
  pre-check:
    name: Pre-check
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qE '^chore\(release\):'; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  fmt:
    name: Format
    runs-on: ubuntu-latest
    needs: pre-check
    if: needs.pre-check.outputs.skip == 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: [pre-check, fmt]
    if: needs.pre-check.outputs.skip == 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run Clippy
        run: cargo clippy --locked -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [pre-check, clippy]
    if: needs.pre-check.outputs.skip == 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --locked

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [pre-check, build]
    if: needs.pre-check.outputs.skip == 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --locked
